var QS=[
  {id:"duration",text:"Wie lange postest du schon auf Instagram?",type:"choice",opts:["Unter 3 Monate","3–12 Monate","Über 1 Jahr"]},
  {id:"problem",text:"Was ist dein größstes Problem gerade?",type:"choice",opts:["Zu wenig Reichweite","Keine echte Connection zur Community","Ich weiß nicht wie ich über Content verkaufe"]},
  {id:"format",text:"Welches Format nutzt du hauptsächlich?",type:"choice",opts:["Reels","Carousels","Beides"]},
  {id:"niche",text:"Was ist deine Nische oder dein Thema?",type:"text",ph:"z.B. Fitness, Online Business, Kochen…"},
  {id:"goal",text:"Was soll dein nächster Post bewirken?",type:"choice",opts:["Neue Leute erreichen","Bestehende Follower aktivieren","Vertrauen aufbauen"]},
  {id:"konkret",text:"Was ist dein konkretes Problem mit deinem Content?",type:"textarea",ph:"Beschreib kurz womit du wirklich kämpfst…"}
];

var ans={},cur=0;

function render(){
  var q=QS[cur];
  document.getElementById("prog").style.width=Math.round((cur/QS.length)*100)+"%";
  document.getElementById("slbl").textContent="Frage "+(cur+1)+" von "+QS.length;
  var h="<div class=\"qblock\"><div class=\"qlabel\">Frage "+(cur+1)+" von "+QS.length+"</div><div class=\"qtext\">"+q.text+"</div>";
  if(q.type==="choice"){
    h+="<div class=\"opts\">";
    q.opts.forEach(function(o){
      var s=ans[q.id]===o?" sel":"";
      h+="<button class=\"opt"+s+"\" data-v=\""+esc(o)+"\" onclick=\"pick('"+q.id+"',this.dataset.v)\"><span class=\"dot\"></span><span>"+o+"</span></button>";
    });
    h+="</div>";
  } else if(q.type==="textarea"){
    h+="<textarea class=\"field\" id=\"fi\" placeholder=\""+q.ph+"\" oninput=\"onInp(this.value)\">"+(ans[q.id]||"")+"</textarea>";
  } else {
    h+="<input type=\"text\" class=\"field\" id=\"fi\" placeholder=\""+q.ph+"\" value=\""+esc(ans[q.id]||"")+"\" oninput=\"onInp(this.value)\">";
  }
  var isLast=cur===QS.length-1;
  var dis=q.type==="choice"&&!ans[q.id]?" disabled":"";
  h+="<div class=\"navrow\">"+(cur>0?"<button class=\"btn-back\" onclick=\"back()\">\u2190 Zur\u00fcck</button>":"")+"<button class=\"btn-next\" id=\"nb\" onclick=\""+(isLast?"doSubmit()":"next()")+"\""+dis+">"+(isLast?"Meine Hooks anzeigen \u2726":"Weiter \u2192")+"</button></div></div>";
  document.getElementById("qbody").innerHTML=h;
  if(q.type!=="choice"){var fi=document.getElementById("fi");if(fi)onInp(fi.value);}
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;");}
function onInp(v){ans[QS[cur].id]=v;var nb=document.getElementById("nb");if(nb)nb.disabled=v.trim().length<1;}
function pick(id,v){ans[id]=v;render();setTimeout(function(){next();},200);}
function next(){
  var q=QS[cur];
  if(q.type!=="choice"){var fi=document.getElementById("fi");if(fi)ans[q.id]=fi.value;if((ans[q.id]||"").trim().length<1)return;}
  else{if(!ans[q.id])return;}
  cur++;render();
}
function back(){cur--;render();}
function doSubmit(){
  var fi=document.getElementById("fi");if(fi)ans[QS[cur].id]=fi.value;
  document.getElementById("sqz").style.display="none";
  document.getElementById("ssend").style.display="block";
  var fd=new FormData();
  fd.append("Wie_lange",ans.duration||"");
  fd.append("Problem",ans.problem||"");
  fd.append("Format",ans.format||"");
  fd.append("Nische",ans.niche||"");
  fd.append("Ziel",ans.goal||"");
  fd.append("Konkretes_Problem",ans.konkret||"");
  fetch("https://formspree.io/f/mvzyyqoj",{method:"POST",body:fd,headers:{Accept:"application/json"}}).catch(function(){}).finally(function(){setTimeout(showRes,800);});
}

var CL={Authority:"cp","Day_in_the_Life":"cc",Educational:"cc","Myth_Busting":"cp",Comparison:"cg",Storytelling:"cp",Random:"cg"};
var CN={Authority:"Authority","Day_in_the_Life":"Day in the Life",Educational:"Educational","Myth_Busting":"Myth Busting",Comparison:"Comparison",Storytelling:"Storytelling",Random:"Random"};

function getHooks(){
  var cats=[],p=ans.problem||"",g=ans.goal||"",d=ans.duration||"";
  if(p.indexOf("Reichweite")>-1||g.indexOf("Neue")>-1)cats.push("Educational","Myth_Busting");
  if(p.indexOf("Connection")>-1||g.indexOf("aktivieren")>-1)cats.push("Storytelling","Day_in_the_Life");
  if(p.indexOf("verkaufe")>-1||g.indexOf("Vertrauen")>-1)cats.push("Authority","Comparison");
  if(d.indexOf("Unter")>-1)cats.push("Educational","Random");
  if(!cats.length)cats=["Educational","Storytelling","Authority"];
  var seen={},uniq=[];
  cats.forEach(function(c){if(!seen[c]){seen[c]=1;uniq.push(c);}});
  cats=uniq.slice(0,3);
  var r={};
  cats.forEach(function(c){
    var key=c;
    var pool=H[key]||H[c.replace(/_/g," ")]||[];
    var all=pool.slice().sort(function(){return Math.random()-.5;});
    r[c]=all.slice(0,7);
  });
  return r;
}

function showRes(){
  document.getElementById("ssend").style.display="none";
  document.getElementById("sres").style.display="block";
  var p=ans.problem||"";
  document.getElementById("rsub").textContent=p.indexOf("Reichweite")>-1?"Fokus: Reichweite & neue Leute erreichen":p.indexOf("Connection")>-1?"Fokus: Community & parasoziale Verbindung":p.indexOf("verkaufe")>-1?"Fokus: Vertrauen aufbauen & verkaufen":"Dein personalisiertes Hook-Paket";
  var hooks=getHooks(),h="";
  h+="<div class=\"optin\" id=\"optinBox\">"+
       "<div class=\"optin-lbl\">GRATIS PDF</div>"+
       "<div class=\"optin-h\">Willst du alle 676 Hooks?</div>"+
       "<div class=\"optin-p\">Du siehst hier nur einen Ausschnitt. Trag deine E-Mail ein und ich schick dir die komplette Liste \u2013 alle 676 Hooks, sortiert nach 7 Kategorien, als PDF.</div>"+
       "<div class=\"optin-form\">"+
         "<input type=\"email\" id=\"olEmail\" placeholder=\"deine@email.de\" oninput=\"olCheck()\">"+
         "<button class=\"optin-btn\" id=\"olBtn\" onclick=\"olSubmit()\" disabled>Schick mir die 676 Hooks \u2192</button>"+
       "</div>"+
       "<div class=\"optin-err\" id=\"olErr\">Hat nicht geklappt \u2013 versuch's nochmal.</div>"+
       "<div class=\"optin-note\">Kein Spam. Du kannst dich jederzeit abmelden.</div>"+
     "</div>";
  Object.keys(hooks).forEach(function(cat){
    var list=hooks[cat];
    if(!list||!list.length)return;
    h+="<span class=\"cat-label "+CL[cat]+"\">"+CN[cat]+"</span>";
    list.forEach(function(hk){
      var safe=hk.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      h+="<div class=\"hook\" data-hook=\""+hk.replace(/"/g,"&quot;")+"\" onclick=\"cp(this)\">"+safe+"<div class=\"hcopy\">Tippen zum Kopieren</div></div>";
    });
    h+="<div class=\"sep\"></div>";
  });
  h+="<div class=\"cta-box\"><div class=\"cta-lbl\">@DIE.WALLI</div><div class=\"cta-txt\">Du willst wissen, WARUM ein Hook funktioniert \u2013 nicht nur welcher? Folg mir auf Instagram f\u00fcr w\u00f6chentliche Breakdowns.</div></div>";
  document.getElementById("rbody").innerHTML=h;
}

function cp(el){
  var txt=el.getAttribute("data-hook");
  var hcopy=el.querySelector(".hcopy");
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){flash(el,hcopy);});}
  else{var ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);flash(el,hcopy);}
}
function flash(el,hcopy){
  el.classList.add("copied");hcopy.textContent="\u2713 Kopiert!";
  setTimeout(function(){el.classList.remove("copied");hcopy.textContent="Tippen zum Kopieren";},1500);
}

function olCheck(){
  var v=(document.getElementById("olEmail").value||"").trim();
  var ok=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  document.getElementById("olBtn").disabled=!ok;
}
function olSubmit(){
  var email=(document.getElementById("olEmail").value||"").trim();
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))return;
  var btn=document.getElementById("olBtn");
  btn.disabled=true;btn.textContent="Schick\u2026";
  document.getElementById("olErr").style.display="none";

  var fd=new FormData();
  fd.append("fields[email]",email);
  fd.append("ml-submit","1");
  fd.append("anticsrf","true");

  fetch("https://assets.mailerlite.com/jsonp/2430363/forms/190162252918162967/subscribe",{
    method:"POST",mode:"no-cors",body:fd
  }).then(function(){olDone();}).catch(function(){olDone();});
}
function olDone(){
  var box=document.getElementById("optinBox");
  if(!box)return;
  box.innerHTML="<div class=\"optin-success\">"+
    "<div class=\"chk\">\u2713</div>"+
    "<h4>Fast geschafft!</h4>"+
    "<p>Ich hab dir gerade eine Mail geschickt. Best\u00e4tige kurz deine Adresse \u2013 danach kommt die PDF mit allen 676 Hooks direkt in dein Postfach.</p>"+
    "</div>";
}
